name: Update Free LLM API Catalog

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT_DIR: free-llm-api-watch

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install optional dependencies
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          python -m pip install --upgrade pip
          if [ -s requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Update catalog
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          python scripts/update_catalog.py
          python scripts/validate_catalog.py
          python scripts/score_models.py
          python scripts/render_docs.py
          python -m unittest discover -s tests -v

      - name: Upload debug artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: free-llm-api-watch-debug
          path: |
            ${{ env.PROJECT_DIR }}/data/source_snapshots.json
            ${{ env.PROJECT_DIR }}/data/free_api_catalog.json
            ${{ env.PROJECT_DIR }}/docs/changelog.md
          if-no-files-found: ignore

      - name: Commit changes
        shell: bash
        run: |
          if [ -n "$(git status --porcelain "$PROJECT_DIR")" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$PROJECT_DIR/data" "$PROJECT_DIR/docs" "$PROJECT_DIR/README.md"
            git commit -m "Update free LLM API catalog"
            git push
          else
            echo "No catalog changes"
          fi
